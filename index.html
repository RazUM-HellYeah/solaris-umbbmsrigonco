<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="description" content="SOLARIS – Portal resmi program UM BBM di Desa Srigonco 2026. Akses buku panduan, video, dan formulir program.">
<meta name="theme-color" content="#0a2a3a">
<title>SOLARIS | UM BBM–Desa Srigonco 2026</title>
<style>
  :root{
    --sky-top:#0a2a3a;
    --sky-bot:#04141d;
    --amber:#ffb020;
    --amber-deep:#e0900a;
    --card-bg:rgba(255,255,255,0.06);
    --card-border:rgba(255,176,32,0.35);
    --text-soft:#cfe3ec;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bot) 100%);
    min-height:100vh;
    display:flex;
    justify-content:center;
  }
  .page{
    width:100%;
    max-width:480px;
    min-height:100vh;
    position:relative;
    padding:36px 20px 40px;
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow:hidden;
  }
  @media (max-width:480px){
    .page{padding:28px 16px 32px;}
    .brand{font-size:38px !important;letter-spacing:4px !important;}
    .sun-ring{width:120px;height:120px;}
    .sun-ring svg{width:62px;height:62px;}
    .badge-pill{padding:6px 12px;}
    .subtitle{font-size:13px;}
    .link-card{padding:13px 14px;}
  }
  .stars{
    position:absolute;
    inset:0;
    z-index:0;
    background-image:
      radial-gradient(1.5px 1.5px at 20px 40px, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 90px 120px, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 150px 60px, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 200px 200px, rgba(255,255,255,0.35), transparent),
      radial-gradient(1px 1px at 260px 90px, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 320px 160px, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 40px 220px, rgba(255,255,255,0.4), transparent);
    background-repeat:repeat;
    background-size:400px 300px;
    opacity:0.8;
  }
  .badge-row{
    position:relative;z-index:2;
    display:flex;
    gap:10px;
    margin-bottom:22px;
  }
  .badge-pill{
    background:rgba(255,255,255,0.95);
    border-radius:999px;
    padding:8px 16px;
    display:flex;
    align-items:center;
    gap:10px;
    box-shadow:0 4px 14px rgba(0,0,0,0.3);
  }
  .logo-circle{
    width:28px;height:28px;border-radius:50%;
    object-fit:cover;
    background:#fff;
  }
  .logo-circle-square{
    width:28px;height:28px;border-radius:50%;
    object-fit:contain;
    background:#fff;
  }
  .sun-ring{
    position:relative;
    z-index:2;
    width:150px;
    height:150px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ffd166, var(--amber-deep) 70%);
    box-shadow:0 0 60px 10px rgba(255,176,32,0.45);
    display:flex;
    align-items:center;
    justify-content:center;
    margin:10px 0 20px;
  }
  .sun-ring svg{width:78px;height:78px;}
  .titleblock{
    position:relative;z-index:2;
    text-align:center;
    margin-bottom:6px;
  }
  .brand{
    font-size:46px;
    font-weight:900;
    letter-spacing:6px;
    background:linear-gradient(180deg, #ffd166, var(--amber-deep));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    line-height:1;
  }
  .subtitle{
    font-size:14px;
    font-weight:600;
    color:var(--text-soft);
    margin-top:12px;
    letter-spacing:0.5px;
  }
  .divider{
    width:60px;
    height:3px;
    background:var(--amber);
    border-radius:3px;
    margin:22px 0;
    opacity:0.7;
  }
  .links{
    position:relative;z-index:2;
    width:100%;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .link-card{
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--card-bg);
    border:1.5px solid var(--card-border);
    border-radius:16px;
    padding:15px 18px;
    text-decoration:none;
    color:#fff;
    backdrop-filter:blur(6px);
    transition:background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
  }
  .link-card:hover{
    background:rgba(255,176,32,0.12);
    border-color:var(--amber);
    transform:translateY(-2px);
  }
  .link-card:active{transform:translateY(0);}
  .icon-box{
    width:40px;height:40px;min-width:40px;
    border-radius:12px;
    background:rgba(255,176,32,0.15);
    display:flex;align-items:center;justify-content:center;
  }
  .icon-box svg{width:20px;height:20px;stroke:var(--amber);}
  .link-text{flex:1;}
  .link-title{font-size:15px;font-weight:700;}
  .link-sub{font-size:11px;color:var(--text-soft);margin-top:2px;}
  .link-card.pending{opacity:0.45;pointer-events:none;}
  .link-card.coming-soon{opacity:0.7;}
  .link-card.coming-soon:hover{background:rgba(255,176,32,0.08);border-color:rgba(255,176,32,0.5);transform:translateY(-1px);}
  .coming-soon-badge{
    font-size:9px;
    font-weight:700;
    letter-spacing:0.5px;
    background:rgba(255,176,32,0.2);
    color:var(--amber);
    border:1px solid rgba(255,176,32,0.4);
    border-radius:999px;
    padding:2px 7px;
    margin-top:4px;
    display:inline-block;
    text-transform:uppercase;
  }
  .arrow{color:var(--amber);font-size:18px;}
  .footer{
    position:relative;z-index:2;
    margin-top:34px;
    text-align:center;
    font-size:12px;
    font-weight:600;
    color:var(--text-soft);
  }
  .footer a{color:var(--amber);text-decoration:none;}
  .footer a:hover{text-decoration:underline;}
</style>
</head>
